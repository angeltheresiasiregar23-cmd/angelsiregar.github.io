<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tugas Pemrograman 1</title>
<style>
body{font-family:Arial,sans-serif;margin:40px}
h2{text-align:center;text-decoration:underline}
table{width:100%;border-collapse:collapse;margin-top:20px}
table,th,td{border:1px solid #000}th,td{padding:10px}
.form-group{margin:15px 0}label{display:inline-block;width:150px}
.section{text-align:center;margin-top:25px}
.upload-center{display:flex;flex-direction:column;align-items:center}
.preview{display:flex;justify-content:center;margin-top:15px}
#imgPrev{display:none;max-width:300px;max-height:300px;border:2px solid #000}
#audioPrev,#videoPrev{display:none;margin-top:15px}
#videoPrev{max-width:100%;width:420px}
.button{text-align:center;margin-top:30px}
</style></head>
<body>
<h2>TUGAS PEMROGRAMAN 1</h2>
<form id="myForm">
<div class="form-group"><label>Nama</label><input type="text" value="ANGEL THERESIA SIREGAR" size="40"></div>
<div class="form-group"><label>NIM</label><input type="text" value="250820007" size="40"></div>
<table>
<tr><th>TAHUN</th><th>PENDIDIKAN</th><th>ALAMAT</th></tr>
<tr><td><input type="text" value="2018-2019"></td><td>SD</td><td><input style="width:95%" type="text"></td></tr>
<tr><td><input type="text" value="2021-2022"></td><td>SMP</td><td><input style="width:95%" type="text"></td></tr>
<tr><td><input type="text" value="2024-2025"></td><td>SMK</td><td><input style="width:95%" type="text"></td></tr>
</table>
<div class="section upload-center"><h3>Hobby</h3><input type="file" id="imgFile" accept="image/*"><div class="preview"><img id="imgPrev"></div></div>
<div class="section upload-center"><h3>Lagu Kesukaan</h3><input type="file" id="audioFile" accept="audio/*"><audio id="audioPrev" controls></audio></div>
<div class="section upload-center"><h3>Film Kesukaan</h3><input type="file" id="videoFile" accept="video/*"><video id="videoPrev" controls></video></div>
<div class="button"><input type="submit" value="Simpan"> <input type="reset" value="Reset"></div>
</form>
<script>
function preview(inp,el){inp.onchange=e=>{const f=e.target.files[0];if(!f)return;el.src=URL.createObjectURL(f);el.style.display='block';}}
preview(imgFile,imgPrev);preview(audioFile,audioPrev);preview(videoFile,videoPrev);
myForm.onsubmit=e=>{e.preventDefault();alert("Data berhasil disimpan!");}
myForm.onreset=()=>setTimeout(()=>{[imgPrev,audioPrev,videoPrev].forEach(x=>{x.removeAttribute('src');x.style.display='none'});[imgFile,audioFile,videoFile].forEach(x=>x.value="");},0);
</script>
</body></html>
